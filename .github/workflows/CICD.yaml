name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  cicd:
    runs-on: ubuntu-latest
    steps:
      - run: node -v
      - uses: actions/checkout@v3
        with:
          ref: 'main'
      - name: initialize project
        run: yarn install
      - name: yarn app test
        run: yarn test
